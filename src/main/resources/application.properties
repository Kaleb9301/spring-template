# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/api

# ===============================
# PROFILE
# ===============================
# Choose the runtime profile explicitly with `--spring.profiles.active=dev` or `prod`.
# Leaving this unset keeps the template runnable for tests and local bootstrapping.

# ===============================
# MULTI-DATASOURCE TOGGLES
# ===============================
app.datasource.enabled=false
app.datasource.primary=

# Keep Boot from requiring a default datasource when dynamic datasources are disabled.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration

# ===============================
# LOGGING
# ===============================
app.logging.base-path=${APP_LOG_BASE_PATH:${catalina.base:${CATALINA_BASE:logs}}/logs}
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.level=%5p [cid:%X{correlationId:-N/A}]

# ===============================
# JACKSON
# ===============================
spring.jackson.serialization.indent_output=true

# ===============================
# DEVTOOLS
# ===============================
spring.devtools.restart.enabled=true

# ===============================
# JWT (OPTIONAL)
# ===============================
jwt.secret=change_this_secret
jwt.expiration=86400000

# ===============================
# SECURITY (TEMPLATE DEFAULTS)
# ===============================
spring.security.user.name=admin
spring.security.user.password=${APP_ADMIN_PASSWORD:change_me}
app.cors.allowed-origin-patterns=*

# ===============================
# SWAGGER / OPENAPI
# ===============================
app.swagger.enabled=true
springdoc.api-docs.enabled=${app.swagger.enabled:true}
springdoc.swagger-ui.enabled=${app.swagger.enabled:true}
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================
# ACTUATOR (OPS)
# ===============================
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===============================
# APP METADATA
# ===============================
info.app.name=spring-template
info.app.description=Reusable Spring Boot template
info.app.version=0.0.1-SNAPSHOT

# ===============================
# REQUEST LOGGING
# ===============================
app.request-logging.enabled=true