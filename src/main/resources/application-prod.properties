# -------------------------------
# DYNAMIC MULTI-DATASOURCE
# -------------------------------
app.datasource.enabled=true
app.datasource.primary=core

# Swagger is disabled by default in production. Override with APP_SWAGGER_ENABLED=true when needed.
app.swagger.enabled=${APP_SWAGGER_ENABLED:false}

app.datasource.connections.core.url=jdbc:sqlserver://localhost:1433;databaseName=prod_core_db;encrypt=true;trustServerCertificate=false
app.datasource.connections.core.username=${CORE_DB_USERNAME}
app.datasource.connections.core.password=${CORE_DB_PASSWORD}
app.datasource.connections.core.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
app.datasource.connections.core.maximum-pool-size=20
app.datasource.connections.core.minimum-idle=5

app.datasource.connections.audit.url=jdbc:postgresql://localhost:5432/prod_audit_db
app.datasource.connections.audit.username=${AUDIT_DB_USERNAME}
app.datasource.connections.audit.password=${AUDIT_DB_PASSWORD}
app.datasource.connections.audit.driver-class-name=org.postgresql.Driver
app.datasource.connections.audit.maximum-pool-size=15
app.datasource.connections.audit.minimum-idle=3

# -------------------------------
# PRODUCTION HARDENING
# -------------------------------
app.logging.base-path=${APP_LOG_BASE_PATH:${catalina.base:${CATALINA_BASE:logs}}/logs}
app.request-logging.enabled=false
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.bankofabyssinia.com}

spring.security.user.name=${APP_ADMIN_USERNAME:admin}
spring.security.user.password=${APP_ADMIN_PASSWORD}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.forward-headers-strategy=framework

management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
